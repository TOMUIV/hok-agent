<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>王者荣耀 LLM Agent Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;align-items:center}
.container{width:100%;max-width:900px;padding:20px}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:24px;color:#f5c842;text-shadow:0 0 10px rgba(245,200,66,.3)}
.header p{font-size:14px;color:#888;margin-top:4px}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:10px 16px;background:#16213e;border-radius:8px;font-size:14px}
.status-bar .frame{color:#f5c842;font-weight:bold}
.status-bar .status{color:#4fc3f7}
.controls{display:flex;gap:10px}
.controls button{padding:8px 24px;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:.2s}
.controls .start{background:#4caf50;color:#fff}
.controls .start:hover{background:#388e3c}
.controls .stop{background:#f44336;color:#fff}
.controls .stop:hover{background:#d32f2f}
.controls button:disabled{opacity:.5;cursor:not-allowed}
.hero-area{display:flex;gap:16px;margin-bottom:16px}
.hero-card{flex:1;padding:16px;border-radius:10px;position:relative}
.hero-card.blue{background:linear-gradient(135deg,#0d47a1,#1565c0)}
.hero-card.red{background:linear-gradient(135deg,#b71c1c,#c62828)}
.hero-card .hero-name{font-size:18px;font-weight:bold;margin-bottom:8px}
.hero-card .hero-stats{font-size:13px;line-height:1.8;color:#ccc}
.hero-card .hp-bar-wrap{height:12px;background:rgba(0,0,0,.4);border-radius:6px;margin:8px 0;overflow:hidden}
.hero-card .hp-bar{height:100%;border-radius:6px;transition:width .3s}
.hero-card .hp-bar.blue{background:linear-gradient(90deg,#42a5f5,#1e88e5)}
.hero-card .hp-bar.red{background:linear-gradient(90deg,#ef5350,#e53935)}
.hero-card .hp-text{font-size:12px;text-align:right;color:#aaa}
.vs{display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#f5c842;min-width:50px;text-shadow:0 0 15px rgba(245,200,66,.5)}
.llm-panel{background:#16213e;border-radius:10px;padding:16px;margin-bottom:16px;max-height:300px;overflow-y:auto}
.llm-panel .title{font-size:14px;color:#888;margin-bottom:8px;display:flex;justify-content:space-between}
.llm-panel .title .step{color:#4fc3f7}
.llm-entry{padding:8px 0;border-bottom:1px solid #1a1a2e;font-size:13px;line-height:1.6}
.llm-entry:last-child{border-bottom:none}
.llm-entry .action-label{display:inline-block;padding:2px 8px;border-radius:4px;font-weight:bold;font-size:12px;margin-right:6px}
.llm-entry .action-label.move{background:#4caf50;color:#fff}
.llm-entry .action-label.attack{background:#f44336;color:#fff}
.llm-entry .action-label.skill{background:#ff9800;color:#fff}
.llm-entry .action-label.none{background:#607d8b;color:#fff}
.llm-entry .action-label.recall{background:#9c27b0;color:#fff}
.llm-entry .llm-raw{color:#999;font-size:11px;margin-top:4px;padding:4px 8px;background:#0d1b2a;border-radius:4px;font-family:monospace;white-space:pre-wrap;word-break:break-all}
.llm-empty{text-align:center;color:#555;padding:40px 0;font-size:14px}
.llm-empty .big{font-size:48px;margin-bottom:10px}
.metrics{display:flex;gap:16px;margin-top:16px}
.metric{flex:1;text-align:center;padding:12px;background:#16213e;border-radius:8px}
.metric .val{font-size:22px;font-weight:bold;color:#f5c842}
.metric .label{font-size:12px;color:#888;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>王者荣耀 · LLM Agent Demo</h1>
    <p>Multi-Agent 层级决策协议 · DeepSeek-V4-Flash</p>
  </div>
  <div class="status-bar">
    <span class="frame" id="frameDisplay">Frame: --</span>
    <span class="status" id="statusDisplay">⏸ 未开始</span>
    <div class="controls">
      <button class="start" id="btnStart" onclick="startGame()">▶ 开始</button>
      <button class="stop" id="btnStop" onclick="stopGame()" disabled>⏹ 停止</button>
    </div>
  </div>
  <div class="hero-area" id="heroArea">
    <div class="hero-card blue" id="heroBlue">
      <div class="hero-name">等待开始...</div>
      <div class="hp-bar-wrap"><div class="hp-bar blue" id="hpBlue" style="width:100%"></div></div>
      <div class="hp-text" id="hpBlueText">HP: --</div>
      <div class="hero-stats" id="statsBlue">Level: -- | Gold: --</div>
    </div>
    <div class="vs">⚔</div>
    <div class="hero-card red" id="heroRed">
      <div class="hero-name">等待开始...</div>
      <div class="hp-bar-wrap"><div class="hp-bar red" id="hpRed" style="width:100%"></div></div>
      <div class="hp-text" id="hpRedText">HP: --</div>
      <div class="hero-stats" id="statsRed">Level: -- | Gold: --</div>
    </div>
  </div>
  <div class="llm-panel" id="llmPanel">
    <div class="title">
      <span>🧠 Agent 决策链路</span>
      <span class="step" id="stepDisplay">Step: 0</span>
    </div>
    <div id="llmContent">
      <div class="llm-empty"><div class="big">🎮</div>点击「开始」启动游戏</div>
    </div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="val" id="totalSteps">0</div><div class="label">总步数</div></div>
    <div class="metric"><div class="val" id="llmCalls">0</div><div class="label">LLM 调用</div></div>
    <div class="metric"><div class="val" id="elapsedTime">0s</div><div class="label">运行时间</div></div>
  </div>
</div>
<script>
let ws = null;
let startTime = null;
let stepCount = 0;
let llmCallCount = 0;
let timerInterval = null;

function getActionLabel(type) {
  const t = (type || '').toUpperCase();
  if (t.includes('MOVE')) return 'move';
  if (t.includes('ATTACK')) return 'attack';
  if (t.includes('SKILL')) return 'skill';
  if (t.includes('RECALL')) return 'recall';
  if (t === 'NONE' || !t) return 'none';
  return 'none';
}

function getActionLabelText(type) {
  const t = (type || '').toUpperCase();
  if (t.includes('MOVE')) return '🚶 移动';
  if (t.includes('ATTACK')) return '⚔ 攻击';
  if (t.includes('SKILL')) return '✨ 技能';
  if (t.includes('RECALL')) return '🏠 回城';
  if (t === 'NONE' || !t) return '⏳ 等待';
  return '❓ ' + type;
}

function startGame() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('statusDisplay').textContent = '🔄 运行中';
  document.getElementById('llmContent').innerHTML = '';
  stepCount = 0;
  llmCallCount = 0;
  startTime = Date.now();
  document.getElementById('totalSteps').textContent = '0';
  document.getElementById('llmCalls').textContent = '0';
  document.getElementById('elapsedTime').textContent = '0s';
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (startTime) {
      const s = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('elapsedTime').textContent = s + 's';
    }
  }, 1000);
  connectWs();
}

function stopGame() {
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('statusDisplay').textContent = '⏸ 已停止';
  if (ws) {
    ws.send(JSON.stringify({action: 'stop'}));
    ws.close();
    ws = null;
  }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    ws.send(JSON.stringify({action: 'start'}));
  };
  ws.onmessage = (evt) => {
    const data = JSON.parse(evt.data);
    if (data.type === 'gameover') {
      document.getElementById('statusDisplay').textContent = '🏁 游戏结束';
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
      return;
    }
    if (data.type === 'status') return;
    stepCount = data.step || 0;
    llmCallCount = stepCount;
    document.getElementById('frameDisplay').textContent = 'Frame: ' + (data.frame || '--');
    document.getElementById('stepDisplay').textContent = 'Step: ' + stepCount;
    document.getElementById('totalSteps').textContent = stepCount;
    document.getElementById('llmCalls').textContent = llmCallCount;
    const heroes = data.heroes || [];
    for (const h of heroes) {
      if (h.camp === 0) {
        document.getElementById('heroBlue').querySelector('.hero-name').textContent = h.name || '英雄';
        document.getElementById('hpBlue').style.width = Math.min(100, Math.max(0, h.hp / 4000 * 100)) + '%';
        document.getElementById('hpBlueText').textContent = 'HP: ' + h.hp;
        document.getElementById('statsBlue').textContent = 'Level: ' + (h.level || 1) + ' | Hero #' + (h.hero_id || '?');
      } else {
        document.getElementById('heroRed').querySelector('.hero-name').textContent = h.name || '英雄';
        document.getElementById('hpRed').style.width = Math.min(100, Math.max(0, h.hp / 4000 * 100)) + '%';
        document.getElementById('hpRedText').textContent = 'HP: ' + h.hp;
        document.getElementById('statsRed').textContent = 'Level: ' + (h.level || 1) + ' | Hero #' + (h.hero_id || '?');
      }
    }
    const llmContent = document.getElementById('llmContent');
    const entry = document.createElement('div');
    entry.className = 'llm-entry';
    const dt = data.llm_decision || '{"decision_type":"NONE"}';
    let dtObj = {};
    try { dtObj = JSON.parse(dt); } catch(e) { dtObj = {decision_type: 'NONE'}; }
    const dtype = dtObj.decision_type || 'NONE';
    const label = getActionLabel(dtype);
    const labelText = getActionLabelText(dtype);
    const params = dtObj.params || {};
    let paramsText = '';
    if (params.direction) paramsText += '方向:' + params.direction + ' ';
    if (params.target) paramsText += '目标:' + params.target + ' ';
    if (params.distance) paramsText += '距离:' + params.distance + ' ';
    entry.innerHTML = '<span class="action-label ' + label + '">' + labelText + '</span> ' +
      (paramsText ? '<span style="color:#aaa">' + paramsText + '</span>' : '') +
      '<div class="llm-raw">' + dt + '</div>';
    llmContent.insertBefore(entry, llmContent.firstChild);
    while (llmContent.children.length > 50) {
      llmContent.removeChild(llmContent.lastChild);
    }
  };
  ws.onclose = () => {
    if (document.getElementById('btnStop').disabled === false) {
      document.getElementById('statusDisplay').textContent = '⚠ 连接断开';
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
    }
    ws = null;
  };
  ws.onerror = () => {
    document.getElementById('statusDisplay').textContent = '⚠ 连接错误';
  };
}
</script>
</body>
</html>
